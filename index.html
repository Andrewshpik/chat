<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>WebSocket Чат</title>
  <style>
    :root {
      --bg:           #1a1a2e;
      --panel:        #0f3460;
      --surface:      #16213e;
      --accent:       #e94560;
      --accent-hover: #c73652;
      --mine:         #2e7d32;
      --hover:        #1a4a7a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #eee;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Aurora-фон: три анимированных размытых пятна ── */
    body::before, body::after, #aurora {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    body::before {
      width: 520px; height: 520px;
      background: var(--accent);
      top: -120px; left: -120px;
      animation: float1 22s ease-in-out infinite;
    }
    body::after {
      width: 480px; height: 480px;
      background: var(--mine);
      bottom: -140px; right: -140px;
      animation: float2 26s ease-in-out infinite;
    }
    #aurora {
      width: 420px; height: 420px;
      background: var(--panel);
      top: 30%; left: 55%;
      opacity: 0.45;
      animation: float3 30s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(60px, 80px) scale(1.15); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(-70px,-60px) scale(1.1); }
    }
    @keyframes float3 {
      0%,100% { transform: translate(0,0) scale(1) rotate(0deg); }
      50%     { transform: translate(-40px, 30px) scale(1.2) rotate(30deg); }
    }

    /* Весь основной контент поверх фона */
    #login-screen, #chat-screen,
    #profile-overlay, #theme-overlay, #dialog-overlay, #toast-container {
      position: relative; z-index: 1;
    }
    #profile-overlay, #theme-overlay, #dialog-overlay { z-index: 100; }
    #dialog-overlay { z-index: 150; }
    #toast-container { z-index: 200; }

    /* ── Вход ── */
    #login-screen {
      display: flex; flex-direction: column;
      gap: 14px; align-items: center;
    }
    #login-screen h1 {
      font-size: 2rem; color: var(--accent);
      letter-spacing: -0.02em; font-weight: 700;
      text-shadow: 0 0 32px color-mix(in srgb, var(--accent) 55%, transparent);
    }

    #avatar-picker { position: relative; cursor: pointer; width: 80px; height: 80px; }
    #avatar-preview {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--panel); border: 3px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; color: #aaa; text-align: center;
      overflow: hidden; transition: opacity 0.15s;
    }
    #avatar-picker:hover #avatar-preview { opacity: 0.8; }
    #avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    #avatar-hint {
      position: absolute; bottom: -2px; right: -2px;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; line-height: 1;
    }
    #avatar-file { display: none; }

    #login-screen input[type="text"] {
      padding: 12px 18px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 1rem; width: 260px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #eee; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #login-screen input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
    }
    #login-screen button {
      padding: 12px 40px; background: var(--accent); color: white;
      border: none; border-radius: 12px; font-size: 1rem; cursor: pointer;
      font-weight: 600; letter-spacing: 0.02em;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 35%, transparent);
      transition: transform 0.15s, box-shadow 0.2s, background 0.15s;
    }
    #login-screen button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 32px color-mix(in srgb, var(--accent) 45%, transparent);
    }
    #login-screen button:active { transform: translateY(0); }

    /* ── Основной экран ── */
    #chat-screen {
      display: none;
      width: 100%; max-width: 1100px; height: 92vh;
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      backdrop-filter: blur(32px) saturate(140%);
      -webkit-backdrop-filter: blur(32px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 24px 60px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.06);
      flex-direction: row;
    }

    /* ── Сайдбар комнат ── */
    #sidebar {
      width: 210px;
      background: rgba(0,0,0,0.15);
      display: flex; flex-direction: column; flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    #sidebar-header {
      padding: 16px 18px; font-weight: 700; font-size: 0.78rem;
      color: #bbb; text-transform: uppercase; letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #rooms-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .room-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; cursor: pointer; border-radius: 10px;
      margin: 2px 8px; font-size: 0.92rem; color: #ccc;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      position: relative;
    }
    .room-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .room-item.active {
      background: var(--accent); color: white;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 40%, transparent);
    }
    .room-item.active:hover { background: var(--accent); }
    .room-item .room-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .room-item .room-count {
      font-size: 0.75rem; background: rgba(255,255,255,0.15);
      padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
    }
    .room-item .room-meta {
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: 6px;
    }
    .room-item .room-unread {
      font-size: 0.72rem; font-weight: 700; color: #fff;
      background: var(--accent); padding: 1px 7px; border-radius: 10px;
      min-width: 20px; text-align: center;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .room-item.has-unread:not(.active) .room-name { color: #fff; font-weight: 600; }
    .room-item.active .room-unread {
      background: #fff; color: var(--accent); box-shadow: none;
    }
    #new-room-area {
      padding: 10px; border-top: 1px solid var(--bg);
      display: flex; flex-direction: column; gap: 6px;
    }
    #new-room-row { display: flex; gap: 6px; }
    #new-room-input, #new-room-pass {
      flex: 1; min-width: 0; padding: 7px 10px; border-radius: 6px;
      border: none; background: var(--surface); color: #eee; font-size: 0.85rem; outline: none;
    }
    #new-room-pass { display: none; }
    #new-room-pass.visible { display: block; }
    #new-room-lock {
      padding: 7px 9px; background: var(--surface); color: #aaa;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.95rem; line-height: 1; flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    #new-room-lock.active { background: var(--accent); color: white; }
    #new-room-channel {
      padding: 7px 9px; background: var(--surface); color: #aaa;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.95rem; line-height: 1; flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    #new-room-channel.active { background: var(--accent); color: white; }
    .room-item .room-kind { font-size: 0.8rem; opacity: 0.8; margin-right: 4px; }

    #channel-readonly-note {
      display: none;
      padding: 10px 16px; font-size: 0.85rem; color: #bbb;
      background: rgba(0,0,0,0.18);
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center; flex-shrink: 0;
    }
    #channel-readonly-note.visible { display: block; }
    #new-room-btn {
      padding: 7px 10px; background: var(--accent); color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; line-height: 1;
      flex-shrink: 0;
    }
    #new-room-btn:hover { background: var(--accent-hover); }
    .room-item .room-lock { font-size: 0.8rem; opacity: 0.7; margin-right: 4px; }

    /* ── Чат ── */
    #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #chat-header {
      background: rgba(0,0,0,0.18);
      padding: 15px 22px;
      font-size: 1.05rem; font-weight: 700; color: var(--accent);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      letter-spacing: -0.01em;
    }
    #chat-header-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #settings-btn {
      flex-shrink: 0;
      background: rgba(255,255,255,0.08); border: none; cursor: pointer;
      font-size: 1.15rem; color: #ccc; padding: 5px 8px;
      border-radius: 6px; transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    #settings-btn:hover { background: var(--hover); color: #eee; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #4caf50; flex-shrink: 0;
      box-shadow: 0 0 10px #4caf50;
      animation: pulse 2s ease-in-out infinite;
    }
    #online-count {
      flex-shrink: 0;
      font-size: 0.78rem; font-weight: 600; color: #ccc;
      background: rgba(255,255,255,0.06);
      padding: 3px 8px; border-radius: 999px;
      letter-spacing: 0.01em;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 10px #4caf50; }
      50%     { box-shadow: 0 0 18px #4caf50, 0 0 4px #4caf50; }
    }
    #no-room {
      flex: 1; display: flex; align-items: center;
      justify-content: center; color: #555; font-size: 1rem;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    #messages > :first-child { margin-top: auto; }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12); border-radius: 3px;
    }
    #messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ── Сообщения ── */
    .msg-row { display: flex; gap: 10px; align-items: flex-start; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-row.system { justify-content: center; }

    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; font-weight: 700; color: white;
      flex-shrink: 0; cursor: pointer; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3),
                  inset 0 0 0 2px rgba(255,255,255,0.08);
    }
    .avatar:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 40%, transparent),
                  inset 0 0 0 2px rgba(255,255,255,0.15);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-body { display: flex; flex-direction: column; max-width: 62%; position: relative; }
    .msg-row.mine .msg-body { align-items: flex-start; }

    .msg-name {
      font-size: 0.78rem; color: #aaa; margin-bottom: 3px;
      cursor: pointer; transition: color 0.15s;
    }
    .msg-name:hover { color: var(--accent); }

    /* ── Сообщения: анимация появления ── */
    .msg-row { animation: msgIn 0.22s cubic-bezier(0.2, 0.9, 0.3, 1.1); }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-bubble {
      padding: 10px 14px; border-radius: 12px;
      font-size: 0.95rem; line-height: 1.4; word-break: break-word;
    }
    .msg-bubble {
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg,
        var(--mine),
        color-mix(in srgb, var(--mine) 75%, black));
      color: white; border-bottom-right-radius: 4px;
      border-color: rgba(255,255,255,0.08);
    }
    .msg-row.other .msg-bubble {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 0.72rem; color: #666; margin-top: 3px; }
    .msg-system { color: #666; font-size: 0.8rem; font-style: italic; }

    /* ── Реакции ── */
    .reaction-picker {
      display: none; position: absolute; top: -38px;
      background: var(--panel); border: 1px solid var(--hover);
      border-radius: 24px; padding: 5px 8px; gap: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4); z-index: 10; white-space: nowrap;
    }
    .msg-row.mine  .reaction-picker { right: 0; }
    .msg-row.other .reaction-picker { left: 0; }
    .reaction-picker button {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; padding: 2px 3px; border-radius: 6px;
      transition: transform 0.1s, background 0.1s; line-height: 1;
    }
    .reaction-picker button:hover { background: rgba(255,255,255,0.1); transform: scale(1.25); }
    .reaction-picker .action-sep {
      width: 1px; background: rgba(255,255,255,0.18);
      margin: 2px 4px; align-self: stretch;
    }
    .msg-bubble.deleted { opacity: 0.55; font-style: italic; }
    .msg-edited { font-size: 0.7rem; color: #888; margin-left: 6px; font-style: italic; }
    .reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .reaction-pill {
      display: flex; align-items: center; gap: 3px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 2px 8px; font-size: 0.82rem;
      cursor: pointer; transition: background 0.15s, border-color 0.15s; user-select: none;
    }
    .reaction-pill:hover { background: rgba(255,255,255,0.15); }
    .reaction-pill.mine { background: rgba(233,69,96,0.18); border-color: var(--accent); color: #f99; }
    .reaction-pill .pill-emoji { font-size: 0.95rem; }
    .reaction-pill .pill-count { font-size: 0.78rem; opacity: 0.9; }

    #typing-indicator {
      min-height: 0; max-height: 0; overflow: hidden;
      padding: 0 20px; color: #9aa; font-size: 0.82rem; font-style: italic;
      display: flex; align-items: center; gap: 6px;
      transition: max-height 0.2s ease, padding 0.2s ease;
    }
    #typing-indicator.visible {
      max-height: 22px; padding: 4px 20px;
    }
    #typing-indicator .dots {
      display: inline-flex; gap: 3px;
    }
    #typing-indicator .dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: currentColor; opacity: 0.5;
      animation: typing-dot 1.2s infinite ease-in-out;
    }
    #typing-indicator .dots span:nth-child(2) { animation-delay: 0.15s; }
    #typing-indicator .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing-dot {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-3px); opacity: 1; }
    }

    #input-area {
      display: flex; padding: 14px; gap: 10px;
      background: rgba(0,0,0,0.18);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      position: relative;
    }
    #input-area input {
      flex: 1; padding: 12px 18px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: #eee; font-size: 1rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #input-area input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
    }
    #input-area button {
      padding: 12px 24px; background: var(--accent); color: white;
      border: none; border-radius: 12px; font-size: 0.95rem;
      cursor: pointer; font-weight: 600;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 35%, transparent);
      transition: transform 0.1s, box-shadow 0.2s, background 0.15s;
    }
    #input-area button:hover {
      background: var(--accent-hover); transform: translateY(-1px);
      box-shadow: 0 8px 20px color-mix(in srgb, var(--accent) 45%, transparent);
    }
    #input-area button:active { transform: translateY(0); }
    #input-area button:disabled { background: #555; cursor: default; box-shadow: none; }

    #emoji-btn {
      padding: 0; width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(255,255,255,0.06); color: #eee;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      font-size: 1.35rem; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: none;
      transition: background 0.15s, transform 0.1s;
    }
    #emoji-btn:hover { background: rgba(255,255,255,0.12); transform: none; }
    #emoji-btn.active { background: var(--accent); color: #fff; }

    #emoji-picker {
      display: none;
      position: absolute; bottom: 76px; left: 14px; z-index: 20;
      width: 300px; max-width: calc(100% - 28px); max-height: 260px;
      overflow-y: auto;
      padding: 10px;
      background: color-mix(in srgb, var(--surface) 96%, transparent);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
    }
    #emoji-picker.open { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; }
    #emoji-picker button {
      padding: 0; width: 100%; aspect-ratio: 1 / 1;
      background: transparent; border: none; border-radius: 8px;
      font-size: 1.35rem; line-height: 1; cursor: pointer; color: inherit;
      display: flex; align-items: center; justify-content: center;
      box-shadow: none;
      transition: background 0.1s, transform 0.08s;
    }
    #emoji-picker button:hover { background: rgba(255,255,255,0.08); transform: none; box-shadow: none; }
    #emoji-picker button:active { transform: scale(0.9); }

    @media (max-width: 768px) {
      #emoji-btn { width: 40px; height: 40px; font-size: 1.2rem; }
      #emoji-picker { left: 10px; bottom: 70px; }
      #emoji-picker.open { grid-template-columns: repeat(7, 1fr); }
    }

    /* ── Участники ── */
    #users-panel {
      width: 190px;
      background: rgba(0,0,0,0.15);
      display: flex; flex-direction: column; flex-shrink: 0;
      border-left: 1px solid rgba(255,255,255,0.06);
    }
    #users-header {
      padding: 16px 18px; font-weight: 700; font-size: 0.78rem;
      color: #bbb; text-transform: uppercase; letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #users-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .user-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; cursor: pointer; border-radius: 10px;
      margin: 2px 8px; transition: background 0.15s, transform 0.1s;
    }
    .user-item:hover { background: rgba(255,255,255,0.06); transform: translateX(2px); }
    .user-avatar-sm {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: bold; color: white;
      flex-shrink: 0; overflow: hidden;
    }
    .user-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
    .user-name-sm { font-size: 0.88rem; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-name-sm.me { color: var(--accent); }
    .user-name-sm .owner-crown { margin-right: 3px; }

    /* ── Профиль ── */
    #profile-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #profile-overlay.open { display: flex; }

    #profile-card {
      background: var(--surface); border-radius: 16px;
      width: 320px; overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      animation: popIn 0.18s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    #profile-banner { height: 80px; position: relative; }
    #change-avatar-btn {
      display: none; position: absolute; bottom: -14px; right: 14px;
      background: var(--accent); border: 2px solid var(--surface);
      color: white; border-radius: 20px;
      padding: 3px 10px; font-size: 0.75rem; cursor: pointer; white-space: nowrap;
    }
    #change-avatar-btn:hover { background: var(--accent-hover); }
    #avatar-edit-file { display: none; }
    #profile-avatar-wrap {
      display: flex; align-items: flex-end; gap: 14px;
      padding: 0 20px; margin-top: -30px;
    }
    #profile-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: bold; color: white;
      border: 3px solid var(--surface); flex-shrink: 0; overflow: hidden;
    }
    #profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    #profile-online {
      font-size: 0.78rem; color: #4caf50; font-weight: 600;
      margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
    }
    #profile-online::before {
      content: ''; display: inline-block;
      width: 8px; height: 8px; border-radius: 50%; background: #4caf50;
    }
    #profile-info { padding: 14px 20px 20px; }
    #profile-name { font-size: 1.25rem; font-weight: bold; margin-bottom: 14px; }
    .profile-stat {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--panel); font-size: 0.88rem;
    }
    .profile-stat:last-child { border-bottom: none; }
    .profile-stat .label { color: #888; }
    .profile-stat .value { color: #eee; font-weight: 500; }
    #profile-close {
      display: block; margin: 0 20px 18px;
      padding: 9px; background: var(--panel); color: #aaa;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; text-align: center; transition: background 0.15s;
      width: calc(100% - 40px);
    }
    #profile-close:hover { background: var(--hover); color: #eee; }

    #profile-admin-btn {
      display: none; margin: 0 20px 10px;
      padding: 9px; background: var(--accent); color: white;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; text-align: center; transition: background 0.15s;
      width: calc(100% - 40px);
    }
    #profile-admin-btn:hover { background: var(--accent-hover); }
    #profile-admin-btn.demote { background: var(--panel); color: #aaa; }
    #profile-admin-btn.demote:hover { background: var(--hover); color: #eee; }

    /* ── Настройки темы ── */
    #theme-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #theme-overlay.open { display: flex; }

    #theme-modal {
      background: var(--surface); border-radius: 16px;
      width: 360px; padding: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      animation: popIn 0.18s ease;
    }
    #theme-modal h2 {
      font-size: 1.1rem; margin-bottom: 18px; color: #eee;
    }

    .theme-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    .theme-card {
      border-radius: 10px; padding: 10px 8px;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
      background: var(--panel);
    }
    .theme-card:hover { transform: scale(1.04); }
    .theme-card.active { border-color: var(--accent); }
    .theme-swatches {
      display: flex; gap: 4px; margin-bottom: 7px;
    }
    .swatch {
      width: 18px; height: 18px; border-radius: 50%;
      flex-shrink: 0;
    }
    .theme-card-name {
      font-size: 0.78rem; color: #ccc; text-align: center;
    }

    .theme-section-title {
      font-size: 0.82rem; color: #888; margin-bottom: 10px;
    }
    .accent-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .accent-dot {
      width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
    }
    .accent-dot:hover { transform: scale(1.15); }
    .accent-dot.active { border-color: white; }

    #theme-close {
      width: 100%; padding: 9px; background: var(--panel); color: #aaa;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; transition: background 0.15s;
    }
    #theme-close:hover { background: var(--hover); color: #eee; }

    /* ── Тосты ── */
    #toast-container {
      position: fixed; top: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 200; pointer-events: none;
    }
    .toast {
      background: var(--surface); color: #eee;
      border-left: 3px solid var(--accent);
      padding: 11px 16px; border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      font-size: 0.9rem; max-width: 320px;
      animation: toastIn 0.2s ease;
      pointer-events: auto;
    }
    .toast.fade { animation: toastOut 0.2s ease forwards; }
    .toast.error { border-left-color: #e94560; }
    .toast.info  { border-left-color: #3b82f6; }
    @keyframes toastIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(20px); opacity: 0; }
    }

    /* ── Диалог ── */
    #dialog-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 150;
      align-items: center; justify-content: center;
    }
    #dialog-overlay.open { display: flex; }
    #dialog-card {
      background: var(--surface); border-radius: 14px;
      width: 340px; padding: 22px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      animation: popIn 0.18s ease;
    }
    #dialog-title {
      font-size: 1.05rem; font-weight: 600;
      color: #eee; margin-bottom: 10px;
    }
    #dialog-message {
      font-size: 0.9rem; color: #bbb;
      margin-bottom: 14px; line-height: 1.4;
    }
    #dialog-input {
      width: 100%; padding: 9px 12px;
      border-radius: 8px; border: none;
      background: var(--panel); color: #eee;
      font-size: 0.95rem; outline: 2px solid transparent;
      transition: outline-color 0.15s; margin-bottom: 16px;
    }
    #dialog-input:focus { outline-color: var(--accent); }
    #dialog-input.hidden { display: none; }
    #dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    #dialog-buttons button {
      padding: 8px 18px; border: none; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
    }
    #dialog-cancel {
      background: var(--panel); color: #aaa;
    }
    #dialog-cancel:hover { background: var(--hover); color: #eee; }
    #dialog-confirm {
      background: var(--accent); color: white;
    }
    #dialog-confirm:hover { background: var(--accent-hover); }
    #dialog-confirm.danger { background: #d32f2f; }
    #dialog-confirm.danger:hover { background: #b71c1c; }

    /* ── Кнопки drawer'ов (видны только на мобильном) ── */
    .drawer-toggle {
      display: none;
      flex-shrink: 0;
      background: rgba(255,255,255,0.08); border: none; cursor: pointer;
      font-size: 1.1rem; color: #ccc; padding: 6px 10px;
      border-radius: 8px; line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .drawer-toggle:hover { background: var(--hover); color: #eee; }

    #drawer-backdrop {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 8;
    }

    /* ── Мобильный макет ── */
    @media (max-width: 768px) {
      body { height: 100dvh; }

      #login-screen {
        width: 92vw; max-width: 420px; padding: 28px 22px;
      }
      #login-screen h1 { font-size: 1.4rem; }

      #chat-screen {
        width: 100%; max-width: none; height: 100dvh;
        border-radius: 0; border: none;
        position: relative;
      }

      .drawer-toggle { display: inline-flex; align-items: center; justify-content: center; }

      #chat-header { padding: 12px 14px; gap: 8px; font-size: 1rem; }
      #chat-header-title { font-size: 0.95rem; }

      #sidebar, #users-panel {
        position: absolute; top: 0; bottom: 0;
        width: 78%; max-width: 300px; z-index: 10;
        transition: transform 0.25s ease;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        background: color-mix(in srgb, var(--surface) 96%, transparent);
      }
      #sidebar { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(255,255,255,0.08); }
      #users-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(255,255,255,0.08); }

      body.drawer-rooms #sidebar { transform: translateX(0); }
      body.drawer-users #users-panel { transform: translateX(0); }
      body.drawer-rooms #drawer-backdrop,
      body.drawer-users #drawer-backdrop { display: block; }

      #messages { padding: 12px 12px; gap: 10px; }
      .msg-bubble { max-width: 78vw; font-size: 0.95rem; }
      .avatar { width: 34px; height: 34px; font-size: 0.85rem; }

      #input-area { padding: 10px; gap: 8px; }
      #input-area input { font-size: 16px; padding: 10px 12px; }
      #input-area button { padding: 10px 14px; font-size: 0.9rem; }

      #profile-card { width: 92vw; max-width: 360px; }

      #dialog-box { width: 92vw; max-width: 360px; padding: 20px; }
      #dialog-input { font-size: 16px; }

      /* iOS: не зумить при фокусе инпутов */
      #name-input, #new-room-input, #new-room-pass, #msg-input, #dialog-input {
        font-size: 16px;
      }
    }

    @media (max-width: 400px) {
      #chat-header { padding: 10px 10px; }
      #chat-header-title { font-size: 0.9rem; }
      #settings-btn { padding: 4px 6px; font-size: 1rem; }
      .msg-bubble { max-width: 82vw; }
    }
  </style>
</head>
<body>

<!-- Aurora-фон -->
<div id="aurora"></div>

<!-- Вход -->
<div id="login-screen">
  <h1>💬 WebSocket Чат</h1>
  <div id="avatar-picker" onclick="document.getElementById('avatar-file').click()" title="Добавить фото">
    <div id="avatar-preview">📷<br><small>Фото</small></div>
    <div id="avatar-hint">+</div>
  </div>
  <input type="file" id="avatar-file" accept="image/*" onchange="onAvatarSelected(this)" />
  <input id="name-input" type="text" placeholder="Ваше имя" maxlength="20" />
  <button onclick="connect()">Войти</button>
</div>

<!-- Основной экран -->
<div id="chat-screen">
  <div id="sidebar">
    <div id="sidebar-header">Комнаты</div>
    <div id="rooms-list"></div>
    <div id="new-room-area">
      <div id="new-room-row">
        <input id="new-room-input" type="text" placeholder="Новая комната" maxlength="30" />
        <button id="new-room-channel" onclick="toggleChannelMode()" title="Канал (писать могут только владелец и админы)">💬</button>
        <button id="new-room-lock" onclick="toggleLock()" title="Приватная комната">🔓</button>
        <button id="new-room-btn" onclick="createRoom()">+</button>
      </div>
      <input id="new-room-pass" type="password" placeholder="Пароль комнаты" maxlength="30" />
    </div>
  </div>

  <div id="chat-area">
    <div id="chat-header">
      <button class="drawer-toggle" id="rooms-toggle" onclick="toggleDrawer('rooms')" title="Комнаты" aria-label="Комнаты">☰</button>
      <div id="status-dot"></div>
      <span id="chat-header-title">Чат</span>
      <span id="online-count" title="Сейчас онлайн">0 онлайн</span>
      <button id="settings-btn" onclick="openTheme()" title="Настройки темы">⚙️</button>
      <button class="drawer-toggle" id="users-toggle" onclick="toggleDrawer('users')" title="Участники" aria-label="Участники">👥</button>
    </div>
    <div id="no-room">← Выберите или создайте комнату</div>
    <div id="messages" style="display:none"></div>
    <div id="typing-indicator"></div>
    <div id="channel-readonly-note">📢 Это канал — писать могут только владелец и админы</div>
    <div id="input-area" style="display:none">
      <button id="emoji-btn" type="button" onclick="toggleEmojiPicker(event)" title="Эмодзи" aria-label="Эмодзи">😊</button>
      <div id="emoji-picker"></div>
      <input id="msg-input" type="text" placeholder="Напишите сообщение..." maxlength="500" oninput="onInputTyping()" />
      <button id="send-btn" onclick="sendMsg()">Отправить</button>
    </div>
  </div>

  <div id="users-panel">
    <div id="users-header">Участники</div>
    <div id="users-list"></div>
  </div>

  <div id="drawer-backdrop" onclick="closeDrawers()"></div>
</div>

<!-- Профиль -->
<div id="profile-overlay" onclick="closeProfile(event)">
  <div id="profile-card">
    <div id="profile-banner">
      <button id="change-avatar-btn" onclick="document.getElementById('avatar-edit-file').click()">✏️ Сменить фото</button>
      <input type="file" id="avatar-edit-file" accept="image/*" onchange="onAvatarEdit(this)" />
    </div>
    <div id="profile-avatar-wrap">
      <div id="profile-avatar"></div>
      <div id="profile-online">В сети</div>
    </div>
    <div id="profile-info">
      <div id="profile-name"></div>
      <div id="profile-stats"></div>
    </div>
    <button id="profile-admin-btn" onclick="toggleAdmin()"></button>
    <button id="profile-close" onclick="document.getElementById('profile-overlay').classList.remove('open')">Закрыть</button>
  </div>
</div>

<!-- Тосты -->
<div id="toast-container"></div>

<!-- Диалог (prompt/confirm) -->
<div id="dialog-overlay">
  <div id="dialog-card">
    <div id="dialog-title"></div>
    <div id="dialog-message"></div>
    <input id="dialog-input" type="text" />
    <div id="dialog-buttons">
      <button id="dialog-cancel">Отмена</button>
      <button id="dialog-confirm">OK</button>
    </div>
  </div>
</div>

<!-- Настройки темы -->
<div id="theme-overlay" onclick="closeTheme(event)">
  <div id="theme-modal">
    <h2>🎨 Настройки темы</h2>
    <div class="theme-section-title">Цветовая схема</div>
    <div class="theme-grid" id="theme-grid"></div>
    <div class="theme-section-title">Акцентный цвет</div>
    <div class="accent-row" id="accent-row"></div>
    <button id="theme-close" onclick="document.getElementById('theme-overlay').classList.remove('open')">Готово</button>
  </div>
</div>

<script>
  /* ══════════════ UI-ХЕЛПЕРЫ (тосты, диалог) ══════════════ */
  function toast(text, variant = 'error', duration = 3200) {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast ' + variant;
    el.textContent = text;
    container.appendChild(el);
    const remove = () => {
      el.classList.add('fade');
      el.addEventListener('animationend', () => el.remove(), { once: true });
    };
    const timer = setTimeout(remove, duration);
    el.addEventListener('click', () => { clearTimeout(timer); remove(); });
  }

  let dialogResolver = null;

  function openDialog({ title, message = '', input = false, defaultValue = '',
                        placeholder = '', confirmText = 'OK', cancelText = 'Отмена',
                        danger = false, type = 'text' }) {
    return new Promise(resolve => {
      if (dialogResolver) { dialogResolver(null); dialogResolver = null; }
      dialogResolver = resolve;

      const overlay = document.getElementById('dialog-overlay');
      const titleEl = document.getElementById('dialog-title');
      const msgEl = document.getElementById('dialog-message');
      const inp = document.getElementById('dialog-input');
      const okBtn = document.getElementById('dialog-confirm');
      const cancelBtn = document.getElementById('dialog-cancel');

      titleEl.textContent = title || '';
      msgEl.textContent = message;
      msgEl.style.display = message ? 'block' : 'none';

      inp.classList.toggle('hidden', !input);
      inp.type = type;
      inp.value = defaultValue;
      inp.placeholder = placeholder;

      okBtn.textContent = confirmText;
      okBtn.classList.toggle('danger', danger);
      cancelBtn.textContent = cancelText;

      overlay.classList.add('open');
      if (input) setTimeout(() => { inp.focus(); inp.select(); }, 0);
      else setTimeout(() => okBtn.focus(), 0);
    });
  }

  function closeDialog(result) {
    document.getElementById('dialog-overlay').classList.remove('open');
    if (dialogResolver) {
      const r = dialogResolver;
      dialogResolver = null;
      r(result);
    }
  }

  function dialogAlert(title, message) {
    return openDialog({ title, message, confirmText: 'OK', cancelText: '' })
      .then(() => null);
  }

  function dialogConfirm({ title, message, confirmText = 'OK', danger = false }) {
    return openDialog({ title, message, confirmText, danger });
  }

  function dialogPrompt({ title, message = '', defaultValue = '', placeholder = '',
                          confirmText = 'OK', type = 'text' }) {
    return openDialog({ title, message, input: true, defaultValue, placeholder, confirmText, type });
  }

  document.addEventListener('DOMContentLoaded', () => {
    const overlay = document.getElementById('dialog-overlay');
    const inp = document.getElementById('dialog-input');
    document.getElementById('dialog-confirm').onclick = () => {
      const useInput = !inp.classList.contains('hidden');
      closeDialog(useInput ? inp.value : true);
    };
    document.getElementById('dialog-cancel').onclick = () => closeDialog(null);
    overlay.onclick = (e) => { if (e.target === overlay) closeDialog(null); };
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); closeDialog(inp.value); }
    });

    const savedName = localStorage.getItem('chat:name');
    if (savedName) {
      const nameInput = document.getElementById('name-input');
      if (nameInput) nameInput.value = savedName;
    }
  });

  /* ══════════════ ТЕМЫ ══════════════ */
  const THEMES = [
    { id: 'ocean',    name: 'Океан',    bg: '#1a1a2e', panel: '#0f3460', surface: '#16213e', mine: '#2e7d32', hover: '#1a4a7a' },
    { id: 'amethyst', name: 'Аметист',  bg: '#1a0a2e', panel: '#2d1b69', surface: '#12082a', mine: '#553393', hover: '#3d2080' },
    { id: 'emerald',  name: 'Изумруд',  bg: '#0a1a0e', panel: '#0f3320', surface: '#081510', mine: '#1b5e20', hover: '#1a4a25' },
    { id: 'sunset',   name: 'Закат',    bg: '#1a100a', panel: '#2d1800', surface: '#120c06', mine: '#bf360c', hover: '#3d2200' },
    { id: 'night',    name: 'Ночной',   bg: '#0d0d0d', panel: '#1a1a1a', surface: '#111111', mine: '#006064', hover: '#252525' },
    { id: 'slate',    name: 'Сланец',   bg: '#0f172a', panel: '#1e293b', surface: '#0d1424', mine: '#1e4266', hover: '#1e3a5f' },
  ];

  const ACCENTS = [
    { id: 'red',    color: '#e94560', hover: '#c73652' },
    { id: 'purple', color: '#a855f7', hover: '#9333ea' },
    { id: 'blue',   color: '#3b82f6', hover: '#2563eb' },
    { id: 'cyan',   color: '#00bcd4', hover: '#0097a7' },
    { id: 'green',  color: '#4caf50', hover: '#388e3c' },
    { id: 'orange', color: '#ff9800', hover: '#f57c00' },
    { id: 'pink',   color: '#ec4899', hover: '#db2777' },
    { id: 'yellow', color: '#eab308', hover: '#ca8a04' },
  ];

  let currentThemeId = 'ocean';
  let currentAccentId = 'red';

  function applyTheme(themeId, accentId) {
    const theme  = THEMES.find(t => t.id === themeId)  || THEMES[0];
    const accent = ACCENTS.find(a => a.id === accentId) || ACCENTS[0];
    const r = document.documentElement.style;
    r.setProperty('--bg',           theme.bg);
    r.setProperty('--panel',        theme.panel);
    r.setProperty('--surface',      theme.surface);
    r.setProperty('--mine',         theme.mine);
    r.setProperty('--hover',        theme.hover);
    r.setProperty('--accent',       accent.color);
    r.setProperty('--accent-hover', accent.hover);
    currentThemeId  = themeId;
    currentAccentId = accentId;
    localStorage.setItem('chat-theme',  themeId);
    localStorage.setItem('chat-accent', accentId);
    renderThemeModal();
  }

  function openTheme() {
    document.getElementById('theme-overlay').classList.add('open');
  }
  function closeTheme(e) {
    if (e.target === document.getElementById('theme-overlay'))
      document.getElementById('theme-overlay').classList.remove('open');
  }

  function renderThemeModal() {
    const grid = document.getElementById('theme-grid');
    grid.innerHTML = '';
    THEMES.forEach(t => {
      const card = document.createElement('div');
      card.className = 'theme-card' + (t.id === currentThemeId ? ' active' : '');
      card.innerHTML = `
        <div class="theme-swatches">
          <div class="swatch" style="background:${t.bg}"></div>
          <div class="swatch" style="background:${t.panel}"></div>
          <div class="swatch" style="background:${t.mine}"></div>
        </div>
        <div class="theme-card-name">${t.name}</div>
      `;
      card.onclick = () => applyTheme(t.id, currentAccentId);
      grid.appendChild(card);
    });

    const row = document.getElementById('accent-row');
    row.innerHTML = '';
    ACCENTS.forEach(a => {
      const dot = document.createElement('div');
      dot.className = 'accent-dot' + (a.id === currentAccentId ? ' active' : '');
      dot.style.background = a.color;
      dot.title = a.id;
      dot.onclick = () => applyTheme(currentThemeId, a.id);
      row.appendChild(dot);
    });
  }

  (function initTheme() {
    const t = localStorage.getItem('chat-theme')  || 'ocean';
    const a = localStorage.getItem('chat-accent') || 'red';
    applyTheme(t, a);
  })();

  /* ══════════════ ЧАТ ══════════════ */
  let ws;
  let myName;
  let myColor = '#aaa';
  let myAvatar = null;
  let currentRoom = null;
  let currentRoomOwner = null;
  let currentRoomAdmins = new Set();
  let currentRoomPrivate = false;
  let currentRoomIsChannel = false;
  const unreadCounts = new Map();
  let knownRoomsList = [];
  let viewingOwnProfile = false;
  let viewingProfileName = null;

  function onAvatarSelected(input) {
    const file = input.files[0];
    if (!file) return;
    resizeImage(file, 128, (dataUrl) => {
      myAvatar = dataUrl;
      document.getElementById('avatar-preview').innerHTML = `<img src="${dataUrl}" />`;
    });
  }

  function onAvatarEdit(input) {
    const file = input.files[0];
    if (!file) return;
    resizeImage(file, 128, (dataUrl) => {
      myAvatar = dataUrl;
      document.getElementById('profile-avatar').innerHTML = `<img src="${dataUrl}" />`;
      document.getElementById('profile-banner').style.background =
        `linear-gradient(135deg, ${myColor}99, ${myColor}33)`;
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'set_avatar', data: dataUrl }));
    });
    input.value = '';
  }

  function resizeImage(file, size, callback) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const side = Math.min(img.width, img.height);
        const sx = (img.width - side) / 2;
        const sy = (img.height - side) / 2;
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        callback(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function updateChatTitle() {
    const title = document.getElementById('chat-header-title');
    if (!currentRoom) { title.textContent = 'Чат'; return; }
    const lockTag = currentRoomPrivate ? '🔒 ' : '';
    const channelTag = currentRoomIsChannel ? '📢 ' : '';
    const prefix = currentRoomIsChannel ? '' : '# ';
    const ownerTag = currentRoomOwner ? ` 👑 ${currentRoomOwner}` : '';
    title.textContent = `${lockTag}${channelTag}${prefix}${currentRoom}${ownerTag}`;
  }

  function canWriteCurrentRoom() {
    if (!currentRoom) return false;
    if (!currentRoomIsChannel) return true;
    return currentRoomOwner === myName || currentRoomAdmins.has(myName);
  }

  function updateChannelWriteMode() {
    const inputArea = document.getElementById('input-area');
    const note = document.getElementById('channel-readonly-note');
    if (!currentRoom) return;
    const writable = canWriteCurrentRoom();
    if (writable) {
      inputArea.style.display = 'flex';
      note.classList.remove('visible');
    } else {
      inputArea.style.display = 'none';
      note.classList.add('visible');
      stopTyping();
    }
  }

  function wsUrl() {
    const loc = window.location;
    if (loc.protocol === 'file:') return 'ws://localhost:8765';
    const proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${proto}//${loc.host}`;
  }

  function fmtTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function fmtDateTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
  }

  function connect() {
    const nameInput = document.getElementById('name-input');
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    myName = name;
    try { localStorage.setItem('chat:name', name); } catch (_) {}

    ws = new WebSocket(wsUrl());

    ws.onopen = () => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('status-dot').style.background = '#4caf50';
      ws.send(JSON.stringify({ type: 'join', name: myName, avatar: myAvatar }));
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'my_profile') {
        myColor = msg.color;
      } else if (msg.type === 'rooms_list') {
        knownRoomsList = msg.rooms;
        renderRoomsList(msg.rooms);
        updateOnlineCount(msg.online);
      } else if (msg.type === 'room_activity') {
        if (msg.room && msg.room !== currentRoom) {
          unreadCounts.set(msg.room, (unreadCounts.get(msg.room) || 0) + 1);
          renderRoomsList(knownRoomsList);
        }
      } else if (msg.type === 'room_joined') {
        currentRoom = msg.room;
        currentRoomOwner = msg.owner || null;
        currentRoomPrivate = !!msg.private;
        currentRoomIsChannel = !!msg.channel;
        unreadCounts.delete(msg.room);
        renderRoomsList(knownRoomsList);
        updateChatTitle();
        updateChannelWriteMode();
        resetTypingState();
        stopTyping();
        document.getElementById('no-room').style.display = 'none';
        document.getElementById('messages').style.display = 'flex';
        document.getElementById('input-area').style.display = 'flex';
        document.getElementById('messages').innerHTML = '';
        document.getElementById('msg-input').focus();
        appendSystem(`Вы вошли в комнату «${msg.room}»`, fmtTime(msg.time));
        document.querySelectorAll('.room-item').forEach(el =>
          el.classList.toggle('active', el.querySelector('.room-name')?.textContent === `# ${msg.room}`)
        );
      } else if (msg.type === 'room_users') {
        if (msg.owner) currentRoomOwner = msg.owner;
        currentRoomAdmins = new Set(msg.admins || []);
        updateChatTitle();
        updateChannelWriteMode();
        renderUsers(msg.users);
      } else if (msg.type === 'channel_readonly') {
        toast('Писать в канал могут только владелец и админы');
      } else if (msg.type === 'system') {
        appendSystem(msg.text, fmtTime(msg.time));
      } else if (msg.type === 'history') {
        for (const m of msg.messages || []) {
          appendMessage(m);
          if (m.reactions && Object.keys(m.reactions).length) {
            updateReactions(m.id, m.reactions);
          }
        }
      } else if (msg.type === 'message') {
        appendMessage(msg);
      } else if (msg.type === 'reaction_update') {
        updateReactions(msg.msg_id, msg.reactions);
      } else if (msg.type === 'profile_data') {
        showProfileCard(msg);
      } else if (msg.type === 'msg_deleted') {
        handleMsgDeleted(msg.msg_id);
      } else if (msg.type === 'msg_edited') {
        handleMsgEdited(msg.msg_id, msg.text);
      } else if (msg.type === 'typing') {
        noteTyping(msg.name);
      } else if (msg.type === 'typing_stop') {
        clearTyping(msg.name);
      } else if (msg.type === 'join_error') {
        if (msg.reason === 'bad_password') {
          toast(`Неверный пароль для комнаты «${msg.room}»`);
        } else if (msg.reason === 'too_many_rooms') {
          toast(`Достигнут лимит комнат (${msg.limit})`);
        } else {
          toast(`Не удалось войти в «${msg.room}»`);
        }
      }
    };

    ws.onerror = () => {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.display = 'none';
      toast('Не удалось подключиться. Убедитесь, что server.py запущен.');
    };

    ws.onclose = () => {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.display = 'none';
      ws = null;
      currentRoom = null;
      currentRoomOwner = null;
      currentRoomAdmins = new Set();
      currentRoomPrivate = false;
      currentRoomIsChannel = false;
      unreadCounts.clear();
      knownRoomsList = [];
      updateTotalUnread();
    };
  }

  function renderRoomsList(rooms) {
    rooms = rooms || [];
    const list = document.getElementById('rooms-list');
    list.innerHTML = '';
    if (rooms.length === 0) {
      list.innerHTML = '<div style="padding:12px 16px;color:#555;font-size:0.85rem">Нет активных комнат</div>';
      updateTotalUnread();
      return;
    }
    rooms.forEach(r => {
      const div = document.createElement('div');
      const hasUnread = (unreadCounts.get(r.name) || 0) > 0;
      div.className = 'room-item'
        + (r.name === currentRoom ? ' active' : '')
        + (hasUnread ? ' has-unread' : '');
      const lock = r.private ? '<span class="room-lock">🔒</span>' : '';
      const kind = r.channel ? '<span class="room-kind">📢</span>' : '';
      const prefix = r.channel ? '' : '# ';
      const unread = unreadCounts.get(r.name) || 0;
      const unreadBadge = unread > 0
        ? `<span class="room-unread">${unread > 99 ? '99+' : unread}</span>`
        : '';
      div.innerHTML =
        `<span class="room-name">${lock}${kind}${prefix}${escapeHtml(r.name)}</span>` +
        `<span class="room-meta">${unreadBadge}<span class="room-count">${r.count}</span></span>`;
      div.onclick = () => joinRoom(r.name, { private: r.private, channel: r.channel });
      list.appendChild(div);
    });
    updateTotalUnread();
  }

  function updateTotalUnread() {
    let total = 0;
    for (const n of unreadCounts.values()) total += n;
    const base = 'WebSocket Чат';
    document.title = total > 0 ? `(${total > 99 ? '99+' : total}) ${base}` : base;
  }

  async function joinRoom(name, opts = {}) {
    if (name === currentRoom) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Нет соединения'); return; }
    let password = opts.password || '';
    if (opts.private && !password) {
      password = await dialogPrompt({
        title: `🔒 ${name}`,
        message: 'Введите пароль комнаты',
        placeholder: 'Пароль',
        type: 'password',
        confirmText: 'Войти',
      });
      if (password === null) return;
    }
    ws.send(JSON.stringify({ type: 'join_room', room: name, password, channel: !!opts.channel }));
    closeDrawers();
  }

  function toggleDrawer(which) {
    const body = document.body;
    const rooms = body.classList.contains('drawer-rooms');
    const users = body.classList.contains('drawer-users');
    body.classList.remove('drawer-rooms', 'drawer-users');
    if (which === 'rooms' && !rooms) body.classList.add('drawer-rooms');
    if (which === 'users' && !users) body.classList.add('drawer-users');
  }

  function closeDrawers() {
    document.body.classList.remove('drawer-rooms', 'drawer-users');
  }

  /* ══════════════ Эмодзи-пикер ══════════════ */
  const EMOJIS = [
    '😀','😁','😂','🤣','😊','😉','😍','🥰','😘','😎','🤩','🤔','😏','😭','😢','😡',
    '🤯','🥳','🤗','🤫','🤐','🤤','😴','😌','😔','😳','😱','🤪','🤨','😜','😝','😅',
    '🙃','🙂','😇','🤓','🥺','😬','😤','🤬','🤒','🤧','🤮','👻','🤖','👽','💀','🎃',
    '👍','👎','👌','✌️','🤝','🙏','👏','🙌','💪','🤞','🤟','🫶','👀','🫡','🤷','🤦',
    '❤️','🧡','💛','💚','💙','💜','🖤','💔','💯','🔥','✨','🎉','🎊','🎁','⭐','🌟',
    '☀️','🌙','☁️','⚡','🌈','❄️','💧','🍀','🌸','🌺','🍕','🍔','🍟','🍩','🍰','☕'
  ];

  function ensureEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    if (picker.childElementCount) return picker;
    const frag = document.createDocumentFragment();
    for (const e of EMOJIS) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = e;
      b.onclick = (ev) => { ev.stopPropagation(); insertEmoji(e); };
      frag.appendChild(b);
    }
    picker.appendChild(frag);
    return picker;
  }

  function toggleEmojiPicker(ev) {
    if (ev) ev.stopPropagation();
    const picker = ensureEmojiPicker();
    const btn = document.getElementById('emoji-btn');
    const isOpen = picker.classList.toggle('open');
    btn.classList.toggle('active', isOpen);
  }

  function closeEmojiPicker() {
    document.getElementById('emoji-picker')?.classList.remove('open');
    document.getElementById('emoji-btn')?.classList.remove('active');
  }

  function insertEmoji(emoji) {
    const input = document.getElementById('msg-input');
    if (!input) return;
    const start = input.selectionStart ?? input.value.length;
    const end = input.selectionEnd ?? input.value.length;
    const v = input.value;
    input.value = v.slice(0, start) + emoji + v.slice(end);
    const pos = start + emoji.length;
    input.focus();
    input.setSelectionRange(pos, pos);
    onInputTyping();
  }

  document.addEventListener('click', (e) => {
    const picker = document.getElementById('emoji-picker');
    const btn = document.getElementById('emoji-btn');
    if (!picker || !picker.classList.contains('open')) return;
    if (picker.contains(e.target) || btn.contains(e.target)) return;
    closeEmojiPicker();
  });

  function updateOnlineCount(n) {
    const el = document.getElementById('online-count');
    if (!el || typeof n !== 'number') return;
    el.textContent = `${n} онлайн`;
  }

  function toggleLock() {
    const btn = document.getElementById('new-room-lock');
    const pass = document.getElementById('new-room-pass');
    const active = btn.classList.toggle('active');
    btn.textContent = active ? '🔒' : '🔓';
    pass.classList.toggle('visible', active);
    if (active) pass.focus();
    else pass.value = '';
  }

  function toggleChannelMode() {
    const btn = document.getElementById('new-room-channel');
    const active = btn.classList.toggle('active');
    btn.textContent = active ? '📢' : '💬';
    btn.title = active
      ? 'Канал (писать могут только владелец и админы)'
      : 'Обычная комната';
  }

  function createRoom() {
    const input = document.getElementById('new-room-input');
    const pass = document.getElementById('new-room-pass');
    const lockBtn = document.getElementById('new-room-lock');
    const channelBtn = document.getElementById('new-room-channel');
    const locked = lockBtn.classList.contains('active');
    const asChannel = channelBtn.classList.contains('active');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    if (locked && !pass.value.trim()) { pass.focus(); return; }
    const password = locked ? pass.value.trim() : '';
    input.value = '';
    pass.value = '';
    if (locked) toggleLock();
    if (asChannel) toggleChannelMode();
    joinRoom(name, { password, channel: asChannel });
  }

  function roleBadge(name) {
    if (name === currentRoomOwner) return '👑 ';
    if (currentRoomAdmins.has(name)) return '⭐ ';
    return '';
  }

  function renderUsers(users) {
    const list = document.getElementById('users-list');
    list.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item';
      const avatarEl = makeAvatarEl(u.name, u.color, u.avatar, 'user-avatar-sm');
      const nameSpan = document.createElement('span');
      nameSpan.className = 'user-name-sm' + (u.name === myName ? ' me' : '');
      const suffix = u.name === myName ? ' (вы)' : '';
      nameSpan.innerHTML = `${roleBadge(u.name)}${escapeHtml(u.name)}${suffix}`;
      div.appendChild(avatarEl);
      div.appendChild(nameSpan);
      div.onclick = () => requestProfile(u.name);
      list.appendChild(div);
    });
  }

  function makeAvatarEl(name, color, avatar, cls) {
    const el = document.createElement('div');
    el.className = cls;
    if (avatar) {
      el.innerHTML = `<img src="${avatar}" alt="${escapeHtml(name)}" />`;
    } else {
      el.style.background = color || '#555';
      el.textContent = initial(name);
    }
    return el;
  }

  const EMOJI = ['👍', '❤️', '😂', '😮', '😢', '👎'];

  function react(msgId, emoji) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'react', msg_id: msgId, emoji }));
  }

  function updateReactions(msgId, reactions) {
    const row = document.querySelector(`.msg-row[data-id="${msgId}"]`);
    if (!row) return;
    const container = row.querySelector('.reactions');
    container.innerHTML = '';
    for (const [emoji, names] of Object.entries(reactions)) {
      if (names.length === 0) continue;
      const pill = document.createElement('button');
      pill.className = 'reaction-pill' + (names.includes(myName) ? ' mine' : '');
      pill.title = names.join(', ');
      pill.innerHTML = `<span class="pill-emoji">${emoji}</span><span class="pill-count">${names.length}</span>`;
      pill.onclick = () => react(msgId, emoji);
      container.appendChild(pill);
    }
  }

  function appendMessage(msg) {
    const container = document.getElementById('messages');
    if (container.style.display === 'none') return;

    const isMine = msg.name === myName;
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
    if (msg.id) row.dataset.id = msg.id;

    const avatarEl = makeAvatarEl(msg.name, msg.color, msg.avatar, 'avatar');
    avatarEl.title = msg.name;
    avatarEl.onclick = () => requestProfile(msg.name);

    const body = document.createElement('div');
    body.className = 'msg-body';

    if (msg.id) {
      const picker = document.createElement('div');
      picker.className = 'reaction-picker';
      EMOJI.forEach(e => {
        const btn = document.createElement('button');
        btn.textContent = e;
        btn.onclick = (ev) => { ev.stopPropagation(); react(msg.id, e); };
        picker.appendChild(btn);
      });

      const canEdit = isMine;
      const canDelete = isMine || myName === currentRoomOwner || currentRoomAdmins.has(myName);
      if (canEdit || canDelete) {
        const sep = document.createElement('div');
        sep.className = 'action-sep';
        picker.appendChild(sep);
      }
      if (canEdit) {
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️';
        editBtn.title = 'Редактировать';
        editBtn.onclick = (ev) => { ev.stopPropagation(); editMessage(msg.id); };
        picker.appendChild(editBtn);
      }
      if (canDelete) {
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️';
        delBtn.title = 'Удалить';
        delBtn.onclick = (ev) => { ev.stopPropagation(); deleteMessage(msg.id); };
        picker.appendChild(delBtn);
      }

      body.appendChild(picker);
      let hideTimer;
      row.addEventListener('mouseenter', () => { clearTimeout(hideTimer); picker.style.display = 'flex'; });
      row.addEventListener('mouseleave', () => { hideTimer = setTimeout(() => { picker.style.display = 'none'; }, 500); });
    }

    if (!isMine) {
      const nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.textContent = roleBadge(msg.name) + msg.name;
      nameEl.onclick = () => requestProfile(msg.name);
      body.appendChild(nameEl);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.text;
    bubble.dataset.text = msg.text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = fmtTime(msg.time);

    const reactionsEl = document.createElement('div');
    reactionsEl.className = 'reactions';

    body.appendChild(bubble);
    body.appendChild(time);
    body.appendChild(reactionsEl);
    row.appendChild(avatarEl);
    row.appendChild(body);

    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function appendSystem(text, time) {
    const container = document.getElementById('messages');
    if (container.style.display === 'none') return;
    const row = document.createElement('div');
    row.className = 'msg-row system';
    const span = document.createElement('span');
    span.className = 'msg-system';
    span.textContent = `${text}${time ? ' · ' + time : ''}`;
    row.appendChild(span);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN || !currentRoom) return;
    ws.send(JSON.stringify({ type: 'message', text }));
    input.value = '';
    input.focus();
    stopTyping();
    closeEmojiPicker();
  }

  /* ══════════════ Индикатор набора ══════════════ */
  const TYPING_TTL = 4000;       // как долго держим чужой индикатор без heartbeat'а
  const TYPING_HEARTBEAT = 2500; // как часто шлём свой heartbeat пока печатаем
  const typingUsers = new Map(); // name -> timeoutId
  let typingSent = false;
  let typingSentResetTimer = null;

  function onInputTyping() {
    const input = document.getElementById('msg-input');
    if (!ws || ws.readyState !== WebSocket.OPEN || !currentRoom) return;
    if (!input.value.trim()) { stopTyping(); return; }
    if (!typingSent) {
      ws.send(JSON.stringify({ type: 'typing' }));
      typingSent = true;
      typingSentResetTimer = setTimeout(() => { typingSent = false; }, TYPING_HEARTBEAT);
    }
  }

  function stopTyping() {
    if (typingSentResetTimer) { clearTimeout(typingSentResetTimer); typingSentResetTimer = null; }
    if (typingSent && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'typing_stop' }));
    }
    typingSent = false;
  }

  function noteTyping(name) {
    if (!name || name === myName) return;
    const prev = typingUsers.get(name);
    if (prev) clearTimeout(prev);
    typingUsers.set(name, setTimeout(() => {
      typingUsers.delete(name);
      renderTyping();
    }, TYPING_TTL));
    renderTyping();
  }

  function clearTyping(name) {
    const prev = typingUsers.get(name);
    if (prev) clearTimeout(prev);
    typingUsers.delete(name);
    renderTyping();
  }

  function resetTypingState() {
    for (const t of typingUsers.values()) clearTimeout(t);
    typingUsers.clear();
    renderTyping();
  }

  function renderTyping() {
    const el = document.getElementById('typing-indicator');
    if (!el) return;
    const names = [...typingUsers.keys()];
    if (!names.length) { el.classList.remove('visible'); el.innerHTML = ''; return; }
    let label;
    if (names.length === 1) label = `${names[0]} печатает`;
    else if (names.length === 2) label = `${names[0]} и ${names[1]} печатают`;
    else label = `${names[0]}, ${names[1]} и ещё ${names.length - 2} печатают`;
    el.innerHTML = `<span>${escapeHtml(label)}</span><span class="dots"><span></span><span></span><span></span></span>`;
    el.classList.add('visible');
  }

  async function editMessage(msgId) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const row = document.querySelector(`.msg-row[data-id="${msgId}"]`);
    if (!row) return;
    const bubble = row.querySelector('.msg-bubble');
    if (!bubble || bubble.classList.contains('deleted')) return;
    const current = bubble.dataset.text || '';
    const next = await dialogPrompt({
      title: 'Редактировать сообщение',
      defaultValue: current,
      confirmText: 'Сохранить',
    });
    if (next === null) return;
    const trimmed = next.trim();
    if (!trimmed || trimmed === current) return;
    ws.send(JSON.stringify({ type: 'edit_msg', msg_id: msgId, text: trimmed }));
  }

  async function deleteMessage(msgId) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const ok = await dialogConfirm({
      title: 'Удалить сообщение?',
      message: 'Это действие нельзя отменить.',
      confirmText: 'Удалить',
      danger: true,
    });
    if (!ok) return;
    ws.send(JSON.stringify({ type: 'delete_msg', msg_id: msgId }));
  }

  function handleMsgDeleted(msgId) {
    const row = document.querySelector(`.msg-row[data-id="${msgId}"]`);
    if (!row) return;
    const bubble = row.querySelector('.msg-bubble');
    if (!bubble) return;
    bubble.classList.add('deleted');
    bubble.textContent = 'сообщение удалено';
    bubble.dataset.text = '';
    const picker = row.querySelector('.reaction-picker');
    if (picker) picker.remove();
    const reactionsEl = row.querySelector('.reactions');
    if (reactionsEl) reactionsEl.innerHTML = '';
  }

  function handleMsgEdited(msgId, text) {
    const row = document.querySelector(`.msg-row[data-id="${msgId}"]`);
    if (!row) return;
    const bubble = row.querySelector('.msg-bubble');
    if (!bubble || bubble.classList.contains('deleted')) return;
    bubble.textContent = text;
    bubble.dataset.text = text;
    const time = row.querySelector('.msg-time');
    if (time && !time.querySelector('.msg-edited')) {
      const mark = document.createElement('span');
      mark.className = 'msg-edited';
      mark.textContent = '(изменено)';
      time.appendChild(mark);
    }
  }

  function requestProfile(name) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'get_profile', name }));
  }

  function showProfileCard(p) {
    const color = p.color || '#555';
    viewingOwnProfile = (p.name === myName);
    viewingProfileName = p.name;
    document.getElementById('profile-banner').style.background =
      `linear-gradient(135deg, ${color}99, ${color}33)`;
    document.getElementById('change-avatar-btn').style.display = viewingOwnProfile ? 'block' : 'none';
    const avatarEl = document.getElementById('profile-avatar');
    avatarEl.style.background = color;
    avatarEl.innerHTML = p.avatar ? `<img src="${p.avatar}" />` : initial(p.name);

    const role = p.is_owner ? '👑 ' : (p.is_admin ? '⭐ ' : '');
    document.getElementById('profile-name').textContent = role + p.name;

    const sameRoom = p.room === currentRoom;
    const roleLabel = p.is_owner ? 'Владелец' : (p.is_admin ? 'Админ' : 'Участник');
    document.getElementById('profile-stats').innerHTML = `
      <div class="profile-stat"><span class="label">Роль</span><span class="value">${roleLabel}</span></div>
      <div class="profile-stat"><span class="label">Сообщений</span><span class="value">${p.msg_count}</span></div>
      <div class="profile-stat"><span class="label">В чате с</span><span class="value">${fmtDateTime(p.joined_at)}</span></div>
      <div class="profile-stat"><span class="label">Текущая комната</span><span class="value">${escapeHtml(p.room)}</span></div>
    `;

    const btn = document.getElementById('profile-admin-btn');
    const iAmOwner = myName === currentRoomOwner;
    const canManage = iAmOwner && sameRoom && !viewingOwnProfile && !p.is_owner;
    if (canManage) {
      btn.style.display = 'block';
      if (p.is_admin) {
        btn.textContent = '⭐ Снять админа';
        btn.classList.add('demote');
        btn.dataset.action = 'demote';
      } else {
        btn.textContent = '⭐ Назначить админом';
        btn.classList.remove('demote');
        btn.dataset.action = 'promote';
      }
    } else {
      btn.style.display = 'none';
    }

    document.getElementById('profile-overlay').classList.add('open');
  }

  function toggleAdmin() {
    if (!viewingProfileName || !ws || ws.readyState !== WebSocket.OPEN) return;
    const action = document.getElementById('profile-admin-btn').dataset.action;
    if (action !== 'promote' && action !== 'demote') return;
    ws.send(JSON.stringify({ type: action, name: viewingProfileName }));
    document.getElementById('profile-overlay').classList.remove('open');
  }

  function closeProfile(e) {
    if (e.target === document.getElementById('profile-overlay'))
      document.getElementById('profile-overlay').classList.remove('open');
  }

  function initial(name) { return name ? name[0].toUpperCase() : '?'; }
  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') connect();
  });
  document.addEventListener('keydown', e => {
    const active = document.activeElement;
    if (e.key === 'Enter' && active === document.getElementById('msg-input')) sendMsg();
    if (e.key === 'Enter' && active === document.getElementById('new-room-input')) createRoom();
    if (e.key === 'Enter' && active === document.getElementById('new-room-pass')) createRoom();
    if (e.key === 'Escape') {
      if (document.getElementById('dialog-overlay').classList.contains('open')) {
        closeDialog(null);
        return;
      }
      document.getElementById('profile-overlay').classList.remove('open');
      document.getElementById('theme-overlay').classList.remove('open');
    }
  });
</script>
</body>
</html>
