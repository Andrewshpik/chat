<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Чат</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Вход ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    #login-screen h1 { font-size: 1.8rem; color: #e94560; }
    #login-screen input {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      width: 240px;
      background: #16213e;
      color: #eee;
      outline: 2px solid #e94560;
    }
    #login-screen button {
      padding: 10px 32px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #login-screen button:hover { background: #c73652; }

    /* ── Основной экран ── */
    #chat-screen {
      display: none;
      width: 100%;
      max-width: 960px;
      height: 90vh;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      flex-direction: row;
    }

    /* ── Сайдбар ── */
    #sidebar {
      width: 220px;
      background: #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 14px 16px;
      font-weight: bold;
      font-size: 0.85rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #1a1a2e;
    }
    #rooms-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .room-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      cursor: pointer;
      border-radius: 6px;
      margin: 2px 8px;
      font-size: 0.92rem;
      color: #ccc;
      transition: background 0.15s;
    }
    .room-item:hover { background: #1a4a7a; }
    .room-item.active { background: #e94560; color: white; }
    .room-item .room-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .room-item .room-count {
      font-size: 0.75rem;
      background: rgba(255,255,255,0.15);
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
      margin-left: 6px;
    }
    #new-room-area { padding: 10px; border-top: 1px solid #1a1a2e; display: flex; gap: 6px; }
    #new-room-input {
      flex: 1; min-width: 0;
      padding: 7px 10px;
      border-radius: 6px; border: none;
      background: #16213e; color: #eee;
      font-size: 0.85rem; outline: none;
    }
    #new-room-btn {
      padding: 7px 10px; background: #e94560; color: white;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 1rem; line-height: 1; flex-shrink: 0;
    }
    #new-room-btn:hover { background: #c73652; }

    /* ── Чат ── */
    #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #chat-header {
      background: #0f3460;
      padding: 14px 20px;
      font-size: 1.05rem; font-weight: bold; color: #e94560;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
    #no-room {
      flex: 1; display: flex; align-items: center;
      justify-content: center; color: #555; font-size: 1rem;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

    /* ── Сообщение ── */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .msg-wrapper.mine { align-items: flex-end; }
    .msg-wrapper.other { align-items: flex-start; }
    .msg-wrapper.system { align-items: center; }

    .msg {
      max-width: 68%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
      position: relative;
    }
    .msg-wrapper.mine .msg {
      background: #2e7d32; color: white;
      border-bottom-right-radius: 2px;
    }
    .msg-wrapper.other .msg {
      background: #0f3460;
      border-bottom-left-radius: 2px;
    }
    .msg-wrapper.system .msg {
      background: transparent; color: #666;
      font-size: 0.8rem; font-style: italic;
      padding: 2px 0; max-width: 100%;
    }
    .msg .meta {
      font-size: 0.75rem; opacity: 0.7; margin-bottom: 4px;
    }

    /* ── Пикер реакций ── */
    .reaction-picker {
      display: none;
      position: absolute;
      top: -38px;
      background: #0a2240;
      border: 1px solid #1a4a7a;
      border-radius: 24px;
      padding: 5px 8px;
      gap: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 10;
      white-space: nowrap;
    }
    .msg-wrapper.mine .reaction-picker { right: 0; }
    .msg-wrapper.other .reaction-picker { left: 0; }

    /* показывается через JS */

    .reaction-picker button {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; padding: 2px 3px;
      border-radius: 6px;
      transition: transform 0.1s, background 0.1s;
      line-height: 1;
    }
    .reaction-picker button:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.25);
    }

    /* ── Бейджи реакций ── */
    .reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }
    .reaction-pill {
      display: flex; align-items: center; gap: 3px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .reaction-pill:hover { background: rgba(255,255,255,0.15); }
    .reaction-pill.mine {
      background: rgba(233, 69, 96, 0.18);
      border-color: #e94560;
      color: #f99;
    }
    .reaction-pill .pill-emoji { font-size: 0.95rem; }
    .reaction-pill .pill-count { font-size: 0.78rem; opacity: 0.9; }

    /* ── Ввод ── */
    #input-area {
      display: flex; padding: 12px; gap: 10px;
      background: #0f3460; flex-shrink: 0;
    }
    #input-area input {
      flex: 1; padding: 10px 16px; border-radius: 8px;
      border: none; background: #16213e; color: #eee;
      font-size: 1rem; outline: none;
    }
    #input-area button {
      padding: 10px 20px; background: #e94560; color: white;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    #input-area button:hover { background: #c73652; }
    #input-area button:disabled { background: #555; cursor: default; }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>💬 WebSocket Чат</h1>
  <input id="name-input" type="text" placeholder="Ваше имя" maxlength="20" />
  <button onclick="connect()">Войти</button>
</div>

<div id="chat-screen">
  <div id="sidebar">
    <div id="sidebar-header">Комнаты</div>
    <div id="rooms-list"></div>
    <div id="new-room-area">
      <input id="new-room-input" type="text" placeholder="Новая комната" maxlength="30" />
      <button id="new-room-btn" onclick="createRoom()">+</button>
    </div>
  </div>

  <div id="chat-area">
    <div id="chat-header">
      <div id="status-dot"></div>
      <span id="chat-title">Чат</span>
    </div>
    <div id="no-room">← Выберите или создайте комнату</div>
    <div id="messages" style="display:none"></div>
    <div id="input-area" style="display:none">
      <input id="msg-input" type="text" placeholder="Напишите сообщение..." maxlength="500" />
      <button id="send-btn" onclick="sendMsg()">Отправить</button>
    </div>
  </div>
</div>

<script>
  const EMOJI = ['👍', '❤️', '😂', '😮', '😢', '👎'];

  let ws;
  let myName;
  let currentRoom = null;
  let currentRoomOwner = null;
  const roomMessages = {};

  function connect() {
    const nameInput = document.getElementById('name-input');
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    myName = name;

    ws = new WebSocket('ws://localhost:8765');

    ws.onopen = () => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('chat-title').textContent = `Чат — ${myName}`;
      document.getElementById('status-dot').style.background = '#4caf50';
      ws.send(JSON.stringify({ type: 'join', name: myName }));
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'rooms_list') {
        renderRoomsList(msg.rooms);
      } else if (msg.type === 'room_joined') {
        currentRoom = msg.room;
        currentRoomOwner = msg.owner;
        if (!roomMessages[currentRoom]) roomMessages[currentRoom] = [];
        showRoom(currentRoom);
        appendSystem(`Вы вошли в комнату «${currentRoom}»`, msg.time);
      } else if (msg.type === 'system') {
        if (currentRoom) {
          roomMessages[currentRoom].push(msg);
          appendSystem(msg.text, msg.time);
        }
      } else if (msg.type === 'message') {
        if (currentRoom) {
          roomMessages[currentRoom].push(msg);
          appendMessage(msg);
        }
      } else if (msg.type === 'reaction_update') {
        updateReactions(msg.msg_id, msg.reactions);
      }
    };

    ws.onerror = () => {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.display = 'none';
      alert('Не удалось подключиться. Убедитесь, что server.py запущен.');
    };

    ws.onclose = () => {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.display = 'none';
      ws = null;
      currentRoom = null;
    };
  }

  function renderRoomsList(rooms) {
    const list = document.getElementById('rooms-list');
    list.innerHTML = '';
    if (rooms.length === 0) {
      list.innerHTML = '<div style="padding:12px 16px;color:#555;font-size:0.85rem">Нет активных комнат</div>';
      return;
    }
    rooms.forEach(r => {
      const div = document.createElement('div');
      div.className = 'room-item' + (r.name === currentRoom ? ' active' : '');
      div.innerHTML = `<span class="room-name"># ${escapeHtml(r.name)}</span><span class="room-count">${r.count}</span>`;
      div.onclick = () => joinRoom(r.name);
      list.appendChild(div);
    });
  }

  function joinRoom(name) {
    if (name === currentRoom) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) { alert('Нет соединения с сервером'); return; }
    ws.send(JSON.stringify({ type: 'join_room', room: name }));
  }

  function createRoom() {
    const input = document.getElementById('new-room-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    input.value = '';
    joinRoom(name);
  }

  function showRoom(room) {
    const ownerTag = currentRoomOwner ? ` 👑 ${currentRoomOwner}` : '';
    document.getElementById('chat-title').textContent = `# ${room}${ownerTag}`;
    document.getElementById('no-room').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('input-area').style.display = 'flex';
    document.getElementById('messages').innerHTML = '';
    (roomMessages[room] || []).forEach(m => {
      if (m.type === 'system') appendSystem(m.text, m.time, false);
      else appendMessage(m, false);
    });
    document.getElementById('msg-input').focus();
    document.querySelectorAll('.room-item').forEach(el => {
      el.classList.toggle('active', el.querySelector('.room-name')?.textContent === `# ${room}`);
    });
  }

  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN || !currentRoom) return;
    ws.send(JSON.stringify({ type: 'message', text }));
    input.value = '';
    input.focus();
  }

  function react(msgId, emoji) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'react', msg_id: msgId, emoji }));
  }

  function appendMessage(msg, scroll = true) {
    const container = document.getElementById('messages');
    if (container.style.display === 'none') return;

    const isMine = msg.name === myName;
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper ' + (isMine ? 'mine' : 'other');
    wrapper.dataset.id = msg.id;

    // Пикер реакций
    const picker = document.createElement('div');
    picker.className = 'reaction-picker';
    EMOJI.forEach(e => {
      const btn = document.createElement('button');
      btn.textContent = e;
      btn.title = e;
      btn.onclick = (ev) => { ev.stopPropagation(); react(msg.id, e); };
      picker.appendChild(btn);
    });

    // Сообщение
    const isOwner = msg.name === currentRoomOwner;
    const bubble = document.createElement('div');
    bubble.className = 'msg';
    const nameTag = isMine ? '' : `${isOwner ? '👑 ' : ''}${escapeHtml(msg.name)} · `;
    bubble.innerHTML = `<div class="meta">${nameTag}${msg.time}</div>${escapeHtml(msg.text)}`;

    // Реакции
    const reactionsEl = document.createElement('div');
    reactionsEl.className = 'reactions';

    wrapper.appendChild(picker);
    wrapper.appendChild(bubble);
    wrapper.appendChild(reactionsEl);
    container.appendChild(wrapper);

    // показать пикер при наведении, скрыть через 5 сек после ухода мыши
    let hideTimer;
    wrapper.addEventListener('mouseenter', () => {
      clearTimeout(hideTimer);
      picker.style.display = 'flex';
    });
    wrapper.addEventListener('mouseleave', () => {
      hideTimer = setTimeout(() => { picker.style.display = 'none'; }, 500);
    });

    if (scroll) container.scrollTop = container.scrollHeight;
  }

  function appendSystem(text, time, scroll = true) {
    const container = document.getElementById('messages');
    if (container.style.display === 'none') return;
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper system';
    const bubble = document.createElement('div');
    bubble.className = 'msg';
    bubble.textContent = `${text}${time ? ' · ' + time : ''}`;
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
    if (scroll) container.scrollTop = container.scrollHeight;
  }

  function updateReactions(msgId, reactions) {
    const wrapper = document.querySelector(`.msg-wrapper[data-id="${msgId}"]`);
    if (!wrapper) return;

    const container = wrapper.querySelector('.reactions');
    container.innerHTML = '';

    for (const [emoji, names] of Object.entries(reactions)) {
      if (names.length === 0) continue;
      const pill = document.createElement('button');
      pill.className = 'reaction-pill' + (names.includes(myName) ? ' mine' : '');
      pill.title = names.join(', ');
      pill.innerHTML = `<span class="pill-emoji">${emoji}</span><span class="pill-count">${names.length}</span>`;
      pill.onclick = () => react(msgId, emoji);
      container.appendChild(pill);
    }

    // scroll если реакция в конце
    const msgs = document.getElementById('messages');
    if (msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 80) {
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') connect();
  });
  document.addEventListener('keydown', e => {
    const active = document.activeElement;
    if (e.key === 'Enter' && active === document.getElementById('msg-input')) sendMsg();
    if (e.key === 'Enter' && active === document.getElementById('new-room-input')) createRoom();
  });
</script>
</body>
</html>
